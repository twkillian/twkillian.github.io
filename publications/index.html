---
layout: default
title: Publications
---
<section class="section">
  <div class="container">
    <h1 style="text-align: center; margin-bottom: 1rem;">Publications</h1>
    <p style="text-align: center; color: var(--text-light); margin-bottom: 3rem;">
      <a href="/" style="color: var(--light-blue);">&larr; Back to Home</a>
    </p>

    <!-- Year Navigation -->
    <div class="year-nav" style="display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 3rem;">
      <button class="year-btn active" onclick="filterYear('all')" style="padding: 0.5rem 1rem; background-color: var(--navy); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">All Years</button>
      <button class="year-btn" onclick="filterYear('2026')" style="padding: 0.5rem 1rem; background-color: var(--secondary-bg); color: var(--navy); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; font-weight: 600;">2026</button>
      <button class="year-btn" onclick="filterYear('2025')" style="padding: 0.5rem 1rem; background-color: var(--secondary-bg); color: var(--navy); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; font-weight: 600;">2025</button>
      <button class="year-btn" onclick="filterYear('2024')" style="padding: 0.5rem 1rem; background-color: var(--secondary-bg); color: var(--navy); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; font-weight: 600;">2024</button>
      <button class="year-btn" onclick="filterYear('2023')" style="padding: 0.5rem 1rem; background-color: var(--secondary-bg); color: var(--navy); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; font-weight: 600;">2023</button>
      <button class="year-btn" onclick="filterYear('2022')" style="padding: 0.5rem 1rem; background-color: var(--secondary-bg); color: var(--navy); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; font-weight: 600;">2022</button>
      <button class="year-btn" onclick="filterYear('2021')" style="padding: 0.5rem 1rem; background-color: var(--secondary-bg); color: var(--navy); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; font-weight: 600;">2021</button>
      <button class="year-btn" onclick="filterYear('Earlier')" style="padding: 0.5rem 1rem; background-color: var(--secondary-bg); color: var(--navy); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; font-weight: 600;">Earlier</button>
    </div>

    <!-- Publications loaded from _data/publications.yml -->
    {% include publications-list.html %}


  </div>
</section>

<style>
.year-btn:hover {
  background-color: var(--light-blue) !important;
  color: white !important;
  border-color: var(--light-blue) !important;
}

.year-btn.active {
  background-color: var(--navy) !important;
  color: white !important;
  border-color: var(--navy) !important;
}
</style>

<script>
function filterYear(year) {
  const sections = document.querySelectorAll('.year-section');
  const buttons = document.querySelectorAll('.year-btn');

  buttons.forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  if (year === 'all') {
    sections.forEach(section => section.style.display = 'block');
  } else if (year === 'Earlier') {
    sections.forEach(section => {
      const sectionYear = parseInt(section.dataset.year);
      section.style.display = (sectionYear <= 2020) ? 'block' : 'none';
    });
  } else {
    sections.forEach(section => {
      section.style.display = section.dataset.year === year ? 'block' : 'none';
    });
  }
}
</script>
