- year: 2023
  papers:
    - title: "Continuous Time Evidential Distributions for Irregular Time Series"
      authors: "<strong>Taylor W. Killian</strong>, Haoran Zhang, Thomas Hartvigsen, Ava Amini"
      venue: "Interpretable Machine Learning in Healthcare Workshop, ICML 2023"
      description: "We extend recent evidential deep learning approaches to sequential settings in continuous time to deal with irregularly sampled time series such as those one encounters in healthcare. This method provides stable, temporally correlated predictions and corresponding well calibrated uncertainty estimates based on the evidence gained with each collected observation."
      links:
        - text: "Paper"
          url: "/papers/KillianZhangHartvigsenAmini_2023IMLH.pdf"
        - text: "Code"
          url: "https://github.com/twkillian/EDICT"
      featured: false

    - title: "Risk Sensitive Dead-end Identification in Safety-Critical Offline Reinforcement Learning"
      authors: "<strong>Taylor W. Killian</strong>, Sonali Parbhoo, Marzyeh Ghassemi"
      venue: "Transactions on Machine Learning Research (TMLR)"
      description: "We improve upon our prior dead-ends work by taking a risk-sensitive approach to dead-end discovery, leveraging distributional RL for value estimation. This allows for earlier indication of dead-ends in a manner that is tunable based on the risk tolerance of the designed task."
      links:
