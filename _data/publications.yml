- year: 2026
  papers:
    - title: "IsoCompute Playbook: Optimally Scaling Sampling Compute for LLM RL"
      authors: "Zhoujun Cheng, Yutao Xie, Yuxiao Qu, Amrith Setlur, Shibo Hao, Varad Pimpalkhute, Tongtong Liang, Feng Yao, Zhengzhong Liu, Eric Xing, Virginia Smith, Ruslan Salakhutdinov, Zhiting Hu, <strong>Taylor W. Killian</strong>, Aviral Kumar"
      venue: "arXiv pre-print"
      description: "We establish scaling laws for LLM Reinforcement Learning by identifying how to optimally allocate compute across parallel rollouts, problem batch size, and update steps. It reveals that increasing parallel rollouts per problem is the primary driver of performance—improving solution quality for easy tasks and coverage for hard ones—while providing practical rules for compute-efficient post-training."
      links:
        - text: "Website"
          url: "https://compute-optimal-rl-llm-scaling.github.io/"
        - text: "Paper"
          url: "https://arxiv.org/abs/2603.12151"
      featured: true

    - title: "Improving and Accelerating Offline RL in Large Discrete Action Spaces with Structured Policy Initialization"
      authors: "Matt Landers, <strong>Taylor W. Killian</strong>, Tom Hartvigsen, Afsaneh Doryab"
      venue: "ICLR 2026"
      description: "SPIN is a two-stage framework that optimizes reinforcement learning in complex combinatorial spaces by first pre-training an Action Structure Model to learn valid action patterns and then training lightweight heads for control. This approach significantly improves performance and stability, outperforming current methods by up to 39% in rewards while achieving convergence up to $12.8\\times$ faster."
      links:
        - text: "Paper"
          url: "/papers/SPIN_LandersKillianHartvigsenDoryab_ICLR26.pdf"
        - text: "Code"
          url: "https://github.com/matthewlanders/SPIN"
      featured: true

- year: 2025
  papers:
    - title: "Concise Reasoning in the Lens of Lagrangian Optimization"
      authors: "Chengqian Gao, Haonan Li, <strong>Taylor W. Killian</strong>, Jianshu She, Renxi Wang, Liqun Ma, Zhoujun Cheng, Shibo Hao, Zhiqiang Xu"
      venue: "arXiv pre-print"
      description: "PALU is a pragmatic optimization strategy that streamlines LLM reasoning by treating concision as a mathematical trade-off between output length and accuracy. It successfully reduces response length by 65% while boosting performance across various domains and model scales, proving that shorter, more focused reasoning chains can actually be more effective."
      links:
        - text: "Paper"
          url: "https://arxiv.org/abs/2510.10168"
      featured: false

    - title: "K2-V2: A 360-Open, Reasoning-Enhanced LLM"
      authors: "K2 Team, Institute of Foundation Models"
      venue: "MBZUAI IFM Technical Report"
      description: "K2-V2 is a fully open-source 360-billion parameter LLM designed as a high-performance foundation for complex reasoning, knowledge retrieval, and tool use. By releasing its complete training history and data, the model provides a transparent, \"reasoning-centric\" base that rivals leading open-weight models like Qwen2.5-72B and approaches the performance of much larger systems."
      links:
        - text: "Website"
          url: "https://ifm.ai/k2/"
        - text: "Paper"
          url: "https://www.llm360.ai/reports/K2_V2_report.pdf"
        - text: "Code"
          url: "https://github.com/llm360/k2v2_train"
        - text: "Data"
          url: "https://huggingface.co/datasets/LLM360/TxT360"
        - text: "Models"
          url: "https://huggingface.co/collections/LLM360/k2-v2"
      featured: true

    - title: "SAINT: Attention-Based Policies for Discrete Combinatorial Action Spaces"
      authors: "Matt Landers, <strong>Taylor W. Killian</strong>, Tom Hartvigsen, Afsaneh Doryab"
      venue: "arXiv pre-print"
      description: "SAINT is a novel policy architecture that uses Transformers to model combinatorial action spaces as unordered sets, capturing complex sub-action dependencies via self-attention. This permutation-invariant approach significantly outperforms traditional baselines in environments with up to $1.35 \\times 10^{18}$ possible actions by improving sample efficiency and joint behavior modeling."
      links:
        - text: "Paper"
          url: "https://arxiv.org/abs/2505.12109"
        - text: "Code"
          url: "https://github.com/matthewlanders/SAINT"
      featured: false

    - title: "BraVE: Offline Reinforcement Learning for Discrete Combinatorial Action Spaces"
      authors: "Matt Landers, <strong>Taylor W. Killian</strong>, Hugo Barnes, Tom Hartvigsen, Afsaneh Doryab"
      venue: "NeurIPS 2025"
      description: "BraVE addresses the computational challenges of high-dimensional, discrete action spaces in offline RL by using tree-structured traversal to capture sub-action dependencies efficiently. This approach enables the evaluation of a linear number of joint actions, outperforming existing methods by up to 20x in complex environments."
      links:
        - text: "Website"
          url: "https://neurips.cc/virtual/2025/loc/san-diego/poster/118272"
        - text: "Paper"
          url: "/papers/BraVE_LandersKillianBarnesHartvigsenDoryab_NeurIPS25.pdf"
        - text: "Code"
          url: "https://github.com/matthewlanders/BraVE"
      featured: true

    - title: "Revisiting Reinforcement Learning for LLM Reasoning from A Cross-Domain Perspective"
      authors: "Zhoujun Cheng, Shibo Hao, Tianyang Liu, Fan Zhou, Yutao Xie, Feng Yao, Yuexin Bian, Yonghao Zhuang, Nilabjo Dey, Yuheng Zha, Yi Gu, Kun Zhou, Yuqi Wang, Yuan Li, Richard Fan, Jianshu She, Chengqian Gao, Abulhair Saparov, Haonan Li, <strong>Taylor W. Killian</strong>, Mikhail Yurochkin, Zhengzhong Liu, Eric P. Xing, Zhiting Hu"
      venue: "NeurIPS 2025"
      description: "Reinforcement learning has emerged as a promising approach to improve large language model reasoning, yet most open efforts focus narrowly on math and code, limiting our understanding of its broader applicability to general reasoning. We introduce Guru, a curated RL reasoning corpus spanning six reasoning domains."
      links:
        - text: "Website"
          url: "https://guru-reasoning.github.io/"
        - text: "Paper"
          url: "https://arxiv.org/abs/2506.14965"
        - text: "Code"
