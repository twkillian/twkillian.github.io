      featured: true

    - title: "Robust Autonomy Emerges from Self-Play"
      authors: "Marco Cusumano-Towner, David Hafner, Alex Hertzberg, Brody Huval, Aleksei Petrenko, Eugene Vinitsky, Erik Wijmans, <strong>Taylor W. Killian</strong>, Stuart Bowers, Ozan Sener, Philipp Krahenbuhl, Vladlen Koltun"
      venue: "ICML 2025"
      description: "We developed a robust autonomous driving agent, in simulation, via self-play at massive scale. This simulator was designed to run in extensively parallel settings where we could aggressively randomize each agent's physical and behavior characteristics and generate substantial amounts of experience."
      links:
        - text: "Paper"
          url: "https://arxiv.org/abs/2502.03349"
      featured: false

- year: 2024
  papers:
    - title: "Clinically Motivated Sequential Decision Making Under Uncertainty in Offline Settings"
      authors: "<strong>Taylor W. Killian</strong>"
      venue: "PhD Thesis, University of Toronto, Department of Computer Science"
      description: "In order to develop practical machine learning aided technology for the benefit of human users, it is critical to anchor scientific research and development by the intended real-world use cases. In this thesis, I propose specific modeling decisions that can be made to develop actionable insights from sequentially observed healthcare data."
      links:
