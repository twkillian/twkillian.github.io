---
layout: default
---
<article class="section">
  <div class="container" style="max-width: 900px;">
    <p style="text-align: center; color: var(--text-light); margin-bottom: 2rem;">
      <a href="/research" style="color: var(--light-blue);">&larr; Back to Research</a>
    </p>

    <header style="text-align: center; margin-bottom: 3rem;">
      <h1 style="margin-bottom: 0.5rem;">{{page.title}}</h1>
      <div style="color: var(--light-blue); font-weight: 600;">{{page.status}}</div>
      {% if page.tags %}
      <div style="margin-top: 1rem;">
        {% for tag in page.tags %}
          <span style="display: inline-block; margin: 0.25rem; padding: 0.4rem 0.8rem; background-color: var(--secondary-bg); color: var(--navy); border-radius: 4px; font-size: 0.9rem;">{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}
    </header>

    <div class="post-content" style="font-size: 1.125rem; line-height: 1.8;">
      {{page.content | markdownify}}
    </div>
  </div>
</article>
