<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Brain outline -->
  <path d="M50 20 C30 20, 20 30, 20 45 C20 50, 22 55, 25 58 C23 62, 22 66, 25 70 C20 75, 22 82, 30 85 C35 87, 40 85, 45 82 C47 85, 50 87, 50 87 C50 87, 53 85, 55 82 C60 85, 65 87, 70 85 C78 82, 80 75, 75 70 C78 66, 77 62, 75 58 C78 55, 80 50, 80 45 C80 30, 70 20, 50 20 Z"
        fill="url(#brainGradient)"
        stroke="#4c51bf"
        stroke-width="2"/>

  <!-- Neural network connections -->
  <circle cx="35" cy="40" r="4" fill="#fbbf24" opacity="0.9"/>
  <circle cx="50" cy="45" r="5" fill="#fbbf24" opacity="0.9"/>
  <circle cx="65" cy="40" r="4" fill="#fbbf24" opacity="0.9"/>
  <circle cx="40" cy="60" r="4" fill="#fbbf24" opacity="0.9"/>
  <circle cx="60" cy="60" r="4" fill="#fbbf24" opacity="0.9"/>

  <!-- Connection lines -->
  <line x1="35" y1="40" x2="50" y2="45" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
  <line x1="65" y1="40" x2="50" y2="45" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="45" x2="40" y2="60" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="45" x2="60" y2="60" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
  <line x1="35" y1="40" x2="40" y2="60" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
  <line x1="65" y1="40" x2="60" y2="60" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
</svg>
